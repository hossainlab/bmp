            - heading "The Linux command line — before a single analysis even begins" [level=4] [ref=e124]
            - paragraph [ref=e125]: Almost every bioinformatics tool runs in a Linux terminal. Most tutorials skip this entirely, assuming you already know it. Most beginners don't — and get stuck immediately.
