          - generic [ref=e128]:
            - heading "Tool installation feels like black magic" [level=4] [ref=e129]
            - paragraph [ref=e130]: Setting up STAR, featureCounts, or Salmon from scratch involves dependency management, PATH variables, and environment configuration — all opaque to someone just trying to analyze RNA-seq data.
        - generic [ref=e131]:
