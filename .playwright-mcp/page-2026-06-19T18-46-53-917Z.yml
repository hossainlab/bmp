      - paragraph [ref=e1492]: The Real Obstacles
      - heading "The Obstacles" [level=2] [ref=e1493]
      - paragraph [ref=e1494]: The biology isn't the hard part. Here is what actually blocks researchers from starting.
      - generic [ref=e1495]:
        - generic [ref=e1496]:
          - generic [ref=e1497]: ⌨️
          - generic [ref=e1498]:
            - heading "The Linux command line — before a single analysis even begins" [level=4] [ref=e1499]
            - paragraph [ref=e1500]: Almost every bioinformatics tool runs in a Linux terminal. Most tutorials skip this entirely, assuming you already know it. Most beginners don't — and get stuck immediately.
        - generic [ref=e1501]:
          - generic [ref=e1502]: 🔧
          - generic [ref=e1503]:
            - heading "Tool installation feels like black magic" [level=4] [ref=e1504]
            - paragraph [ref=e1505]: Setting up STAR, featureCounts, or Salmon from scratch involves dependency management, PATH variables, and environment configuration — all opaque to someone just trying to analyze RNA-seq data.
        - generic [ref=e1506]:
          - generic [ref=e1507]: 💻
          - generic [ref=e1508]:
            - heading "The Compute Gap — Personal hardware vs. Production-grade data" [level=4] [ref=e1509]
            - paragraph [ref=e1510]: Modern genomics requires significant RAM and processing power that standard laptops can't provide. We move you beyond local bottlenecks to professional HPC and Cloud environments.
        - generic [ref=e1511]:
          - generic [ref=e1512]: 🗂️
          - generic [ref=e1513]:
            - heading "A maze of file formats with no map" [level=4] [ref=e1514]
            - paragraph [ref=e1515]: FASTQ, BAM, SAM, GTF, BED, VCF — knowing which tool requires which format, and how to convert between them, is genuinely confusing when you're starting out.
        - generic [ref=e1516]:
          - generic [ref=e1517]: 📖
          - generic [ref=e1518]:
            - heading "Written tutorials have no \"start here\" arrow" [level=4] [ref=e1519]
            - paragraph [ref=e1520]: Even comprehensive tutorials can overwhelm a beginner who doesn't know which section to read first, what to skip, or how to connect the pieces into a coherent pipeline.
