      - paragraph [ref=e1456]: The Real Obstacles
      - heading "The Obstacles" [level=2] [ref=e1457]
      - paragraph [ref=e1458]: The biology isn't the hard part. Here is what actually blocks researchers from starting.
      - generic [ref=e1459]:
        - generic [ref=e1460]:
          - generic [ref=e1461]: ⌨️
          - generic [ref=e1462]:
            - heading "The Linux command line — before a single analysis even begins" [level=4] [ref=e1463]
            - paragraph [ref=e1464]: Almost every bioinformatics tool runs in a Linux terminal. Most tutorials skip this entirely, assuming you already know it. Most beginners don't — and get stuck immediately.
        - generic [ref=e1465]:
          - generic [ref=e1466]: 🔧
          - generic [ref=e1467]:
            - heading "Tool installation feels like black magic" [level=4] [ref=e1468]
            - paragraph [ref=e1469]: Setting up STAR, featureCounts, or Salmon from scratch involves dependency management, PATH variables, and environment configuration — all opaque to someone just trying to analyze RNA-seq data.
        - generic [ref=e1470]:
          - generic [ref=e1471]: 💻
          - generic [ref=e1472]:
            - heading "The Compute Gap — Personal hardware vs. Production-grade data" [level=4] [ref=e1473]
            - paragraph [ref=e1474]: Modern genomics requires significant RAM and processing power that standard laptops can't provide. We move you beyond local bottlenecks to professional HPC and Cloud environments.
        - generic [ref=e1475]:
          - generic [ref=e1476]: 🗂️
          - generic [ref=e1477]:
            - heading "A maze of file formats with no map" [level=4] [ref=e1478]
            - paragraph [ref=e1479]: FASTQ, BAM, SAM, GTF, BED, VCF — knowing which tool requires which format, and how to convert between them, is genuinely confusing when you're starting out.
        - generic [ref=e1480]:
          - generic [ref=e1481]: 📖
          - generic [ref=e1482]:
            - heading "Written tutorials have no \"start here\" arrow" [level=4] [ref=e1483]
