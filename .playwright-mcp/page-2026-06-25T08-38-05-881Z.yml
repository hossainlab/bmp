        - heading [level=2]: The need. The problem. The solution.
        - paragraph: Why NGS literacy is now essential — and exactly how this program gets you there.
      - generic:
        - generic: Why This Mentorship Matters
        - heading [level=2]: NGS data analysis is no longer optional
        - paragraph: Whether you're in academia or industry, the ability to analyze your own sequencing data is rapidly becoming a baseline expectation — not a bonus skill.
        - generic:
          - generic:
            - generic: "01"
            - generic:
              - img
              - generic: Academia
            - heading [level=4]: You understand your biology — own your data too
            - paragraph: RNA-seq has become routine in labs of every size. No external bioinformatician knows your experimental system, your controls, or your biological hypotheses the way you do. Analyzing your own data doesn't just save time — it generates deeper, more accurate insights.
          - generic:
            - generic: "02"
            - generic:
              - img
              - generic: Industry
            - heading [level=4]: Wet lab + dry lab = an unfair advantage
            - paragraph: Top pharmaceutical and biotech companies actively seek researchers who can move fluidly between bench and computation. This hybrid profile is rare, commands higher salaries, and opens doors that remain closed to specialists on either side alone.
          - generic:
            - generic: "03"
            - generic:
              - img
              - generic: Career
            - heading [level=4]: The field has moved. Don't get left behind.
            - paragraph: NGS data is now universal across life sciences. Labs without dedicated bioinformaticians are competing for collaborators, waiting months for results, and missing publication deadlines. Knowing how to handle this data is simply part of being a competitive researcher today.
        - paragraph:
          - text: Perspective adapted from
          - strong: Dr. Lei Guo
          - text: ", Computational Biologist · UT Southwestern Medical Center"
