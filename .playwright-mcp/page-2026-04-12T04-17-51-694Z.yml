    - generic [ref=e32]:
      - paragraph [ref=e33]: Program Outcomes
      - heading "Transition from data consumer to independent researcher" [level=2] [ref=e34]
      - paragraph [ref=e35]: Whether you're in academia or industry, the ability to analyze your own sequencing data is rapidly becoming a baseline expectation — not a bonus skill.
      - generic [ref=e36]:
        - generic [ref=e37]:
          - generic [ref=e39]: 01 / Computational Independence
          - heading "Stop waiting. Start analyzing." [level=3] [ref=e40]
          - paragraph [ref=e41]: By the end of this program, you run your own pipelines, interpret your own results, and make decisions grounded in data — without depending on a collaborator or waiting weeks for someone else's availability.
        - generic [ref=e42]:
          - generic [ref=e44]: 02 / A Publication to Your Name
          - heading "Leave with work you can submit" [level=3] [ref=e45]
          - paragraph [ref=e46]: You don't just learn techniques — you apply them to a real research question and produce a manuscript-ready output. Reproducible code, polished figures, a structured methods section, and a results narrative ready for journal submission.
        - generic [ref=e47]:
          - generic [ref=e49]: 03 / A Researcher Who Can Do Both
          - heading "Rare, competitive, and in demand" [level=3] [ref=e50]
          - paragraph [ref=e51]: Most researchers are strong on one side. You'll leave this program fluent in both. That combination — deep biological understanding paired with hands-on data analysis — is what separates candidates in applications, fellowships, and hiring.
      - paragraph [ref=e53]: Why This Matters
      - heading "NGS analysis is no longer optional" [level=2] [ref=e54]
      - paragraph [ref=e55]: Sequencing data is generated in labs of every scale. The question is no longer whether your research involves it — it's whether you can work with it directly.
      - generic [ref=e56]:
        - generic [ref=e57]:
          - generic [ref=e59]: 01 / Academia
          - heading "You understand the biology — take ownership of the data" [level=3] [ref=e60]
          - paragraph [ref=e61]: RNA-seq is now routine across labs of every scale, yet most researchers still outsource the analysis. No collaborator shares your depth of knowledge about experimental controls, design rationale, or underlying biology. Handling your own data leads to faster turnarounds and more hypothesis-driven, accurate findings.
        - generic [ref=e62]:
          - generic [ref=e64]: 02 / Industry
          - heading "Bridging bench and computation is a genuine career edge" [level=3] [ref=e65]
          - paragraph [ref=e66]: Pharmaceutical and biotech teams increasingly hire researchers who move fluidly between wet and dry lab work. This profile remains rare — and it reflects directly in compensation and the scope of roles available. Specialists anchored to only one side consistently find fewer doors open to them.
        - generic [ref=e67]:
          - generic [ref=e69]: 03 / Career
          - heading "The field has shifted — computational literacy is now the floor" [level=3] [ref=e70]
          - paragraph [ref=e71]: NGS data spans every corner of life sciences today. Research groups without in-house analysis capability are waiting on collaborators, slipping on deadlines, and falling behind in competitive publication landscapes. Working fluently with sequencing data is no longer a differentiator — it's a baseline expectation.
    - generic [ref=e73]:
      - paragraph [ref=e74]: The Mentor
      - heading "Md. Jubayer Hossain Founder & CEO, DeepBio Ltd" [level=2] [ref=e75]:
        - text: Md. Jubayer Hossain
        - text: Founder & CEO, DeepBio Ltd
      - generic [ref=e76]:
        - paragraph [ref=e77]: With over five years of experience in computational biology and cancer genomics research, Md. Jubayer Hossain has guided hundreds of researchers through independent bioinformatics projects. His mentees have published in high-impact journals and advanced to positions in top research institutions and biotech companies.
        - paragraph [ref=e78]: As Founder & CEO of DeepBio Ltd, Jubayer bridges the gap between cutting-edge research and accessible training. He understands the exact obstacles researchers face when learning NGS data analysis — and has built proven pipelines and curricula that accelerate that journey.
        - paragraph [ref=e79]: During these 12-week mentorships, Jubayer provides not just technical guidance, but strategy on dataset selection, research design, and publication. He's committed to moving each mentee from data consumer to independent researcher—capable of asking their own research questions and answering them with confidence.
        - paragraph [ref=e80]: "The goal of this program is simple: equip you with the bioinformatics skills, research maturity, and publication portfolio that will define your career in cancer genomics or neuroscience research."
    - generic [ref=e82]:
      - paragraph [ref=e83]: The Real Obstacles
      - heading "Why beginners get stuck" [level=2] [ref=e84]
      - paragraph [ref=e85]: The biology isn't the hard part. Here's what actually blocks researchers from getting started.
      - generic [ref=e86]:
        - generic [ref=e87]:
          - generic [ref=e88]: ⌨️
          - generic [ref=e89]:
            - heading "The Linux command line — before a single analysis even begins" [level=4] [ref=e90]
            - paragraph [ref=e91]: Almost every bioinformatics tool runs in a Linux terminal. Most tutorials skip this entirely, assuming you already know it. Most beginners don't — and get stuck immediately.
        - generic [ref=e92]:
          - generic [ref=e93]: 🔧
          - generic [ref=e94]:
            - heading "Tool installation feels like black magic" [level=4] [ref=e95]
            - paragraph [ref=e96]: Setting up STAR, featureCounts, or Salmon from scratch involves dependency management, PATH variables, and environment configuration — all opaque to someone just trying to analyze RNA-seq data.
        - generic [ref=e97]:
          - generic [ref=e98]: 💻
          - generic [ref=e99]:
            - heading "Personal computers simply can't handle the compute" [level=4] [ref=e100]
            - paragraph [ref=e101]: Genome indexing, alignment, and quantification require significant RAM and storage. These jobs need a server or HPC — and most beginners have no path to one.
        - generic [ref=e102]:
          - generic [ref=e103]: 🗂️
          - generic [ref=e104]:
            - heading "A maze of file formats with no map" [level=4] [ref=e105]
            - paragraph [ref=e106]: FASTQ, BAM, SAM, GTF, BED, VCF — knowing which tool requires which format, and how to convert between them, is genuinely confusing when you're starting out.
        - generic [ref=e107]:
          - generic [ref=e108]: 📖
          - generic [ref=e109]:
            - heading "Written tutorials have no \"start here\" arrow" [level=4] [ref=e110]
            - paragraph [ref=e111]: Even comprehensive tutorials can overwhelm a beginner who doesn't know which section to read first, what to skip, or how to connect the pieces into a coherent pipeline.
