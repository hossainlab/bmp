      - heading "The Summer I Stopped Being Afraid to Ask Questions" [level=1] [ref=e32]
      - generic [ref=e33]:
        - generic [ref=e34]: FA
        - generic [ref=e35]:
          - generic [ref=e36]: Fayez Ahmad · GSA Bioinformatics Intern
          - generic [ref=e37]: Notre Dame College, Dhaka · June 15, 2026
      - img "The Summer I Stopped Being Afraid to Ask Questions" [ref=e39]
      - generic [ref=e40]:
        - paragraph [ref=e41]: At the start of my internship journey, I was a 12th-grade student at Notre Dame College, Dhaka. While my preparation for the International Biology Olympiad and online bioinformatics courses had given me strong theoretical knowledge, my only hands-on research experience was working on designing a computational model of a photosynthetic microbial consortium for Mars during the Non-Trivial Research Foundation Camp. I was eager to turn that theory into real-world impact, wanting to know what it truly meant to be a computational biology researcher and to see if academia was my true calling. However, walking into the program as the youngest and least experienced of the five interns, a wave of hesitation hit me. I found myself holding back questions, constantly worried that my age would be blamed for any gap in my understanding.
        - heading "A culture that dissolved the imposter syndrome" [level=2] [ref=e42]
        - paragraph [ref=e43]: That initial imposter syndrome did not last long, thanks to the welcoming culture established by our mentors, Md. Jubayer Hossain, Muhibullah Shahjahan, and Muntasim Fuad. Instead of throwing us directly into the deep end of complex data, they dedicated the first couple of weeks entirely to conducting foundational classes in R. Throughout the internship, whenever a project demanded a specialized skill set, the mentors were right there to teach a targeted class, suggest literature, or point us toward the exact resources we needed. Jubayer Vai's patient, structured guidance completely dissolved any hesitation, allowing me to research alongside the team with confidence.
        - heading "Researching esophageal cancer" [level=2] [ref=e44]
        - paragraph [ref=e45]: My primary research focused on Esophageal Cancer, which is the leading cause of cancer fatalities for both sexes in Bangladesh. To overcome the limitations of small sample sizes in existing studies, we combined 16 RNA-seq datasets from NCBI GEO to conduct a large-scale meta-analysis of Esophageal Squamous Cell Carcinoma and Esophageal Adenocarcinoma. Leveraging the R programming and bioinformatics skills mastered in our early weeks, we used R packages such as DESeq2 and MetaVolcanoR, alongside bioinformatics tools like STRING, UALCAN, and cBioPortal, to perform multi-omics analyses and identify consensus biomarkers of esophageal cancer.
        - heading "Presenting and teaching" [level=2] [ref=e46]
        - paragraph [ref=e47]: Sharing the early version of the research at the BSM International Conference 2025 as the only high school presenter was an unforgettable experience. Standing before veteran scientists, handling technical questions about my pipeline, and networking with peers taught me lessons in scientific communication I couldn't have learned any other way.
        - paragraph [ref=e48]: As part of the internship, I also taught classes for the School of Bioinformatics. I've always loved teaching, so getting to pass on fundamental bioinformatics skills to the next generation and answer their curious questions was genuinely one of my favorite parts of the experience.
        - heading "The first building blocks toward MIT" [level=2] [ref=e49]
        - paragraph [ref=e50]: This transformative experience became central to my next academic chapter. When applying to the Massachusetts Institute of Technology, I submitted my research abstract alongside a heartfelt Letter of Recommendation from Mr. Md. Jubayer Hossain. Showcasing the genuine computational and analytical skills I developed during this internship was pivotal in securing my admission to MIT's incoming freshman class. As I prepare to step onto campus, the multi-omic workflows I learned under Mr. Hossain are the first building blocks toward my long-term vision of developing open, low-cost early-detection computational models and deploying them directly into hospitals in Bangladesh to diagnose esophageal cancer before it is too late.
        - blockquote [ref=e51]:
          - paragraph [ref=e52]: "To future interns entering the GSA Bioinformatics program, my advice is simple: never stop asking questions. Whenever you're confused, ask your mentors and clear it up on the spot. With a solid foundation and hard work, the sky really is the limit."
