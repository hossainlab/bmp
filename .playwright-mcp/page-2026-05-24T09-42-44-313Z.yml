    - generic [ref=e88]:
      - paragraph [ref=e89]: Program Outcomes
      - heading "Research Independence" [level=2] [ref=e90]
      - paragraph [ref=e91]: Computational skills are now a baseline requirement for modern life sciences research.
      - generic [ref=e92]:
        - generic [ref=e93]:
          - generic [ref=e95]: 01 / Computational Independence
          - heading "Stop waiting. Start analyzing." [level=3] [ref=e96]
          - paragraph [ref=e97]: By the end of this program, you run your own pipelines, interpret your own results, and make decisions grounded in data — without depending on a collaborator or waiting weeks for someone else's availability.
        - generic [ref=e98]:
          - generic [ref=e100]: 02 / A Publication to Your Name
          - heading "Leave with work you can submit" [level=3] [ref=e101]
          - paragraph [ref=e102]: You don't just learn techniques — you apply them to a real research question and produce a manuscript-ready output. Reproducible code, polished figures, a structured methods section, and a results narrative ready for journal submission.
        - generic [ref=e103]:
          - generic [ref=e105]: 03 / A Researcher Who Can Do Both
          - heading "Rare, competitive, and in demand" [level=3] [ref=e106]
          - paragraph [ref=e107]: Most researchers are strong on one side. You'll leave this program fluent in both. That combination — deep biological understanding paired with hands-on data analysis — is what separates candidates in applications, fellowships, and hiring.
      - paragraph [ref=e109]: Why This Matters
      - heading "Critical Skills" [level=2] [ref=e110]
      - paragraph [ref=e111]: The question is no longer if your research involves NGS data, but whether you can analyze it directly.
      - generic [ref=e112]:
        - generic [ref=e113]:
          - generic [ref=e115]: 01 / Academia
          - heading "You understand the biology — take ownership of the data" [level=3] [ref=e116]
          - paragraph [ref=e117]: RNA-seq is now routine across labs of every scale, yet most researchers still outsource the analysis. No collaborator shares your depth of knowledge about experimental controls, design rationale, or underlying biology. Handling your own data leads to faster turnarounds and more hypothesis-driven, accurate findings.
        - generic [ref=e118]:
          - generic [ref=e120]: 02 / Industry
          - heading "Bridging bench and computation is a genuine career edge" [level=3] [ref=e121]
          - paragraph [ref=e122]: Pharmaceutical and biotech teams increasingly hire researchers who move fluidly between wet and dry lab work. This profile remains rare — and it reflects directly in compensation and the scope of roles available. Specialists anchored to only one side consistently find fewer doors open to them.
        - generic [ref=e123]:
          - generic [ref=e125]: 03 / Career
          - heading "The field has shifted — computational literacy is now the floor" [level=3] [ref=e126]
          - paragraph [ref=e127]: NGS data spans every corner of life sciences today. Research groups without in-house analysis capability are waiting on collaborators, slipping on deadlines, and falling behind in competitive publication landscapes. Working fluently with sequencing data is no longer a differentiator — it's a baseline expectation.
    - generic [ref=e129]:
      - paragraph [ref=e130]: The Real Obstacles
      - heading "The Obstacles" [level=2] [ref=e131]
      - paragraph [ref=e132]: The biology isn't the hard part. Here is what actually blocks researchers from starting.
      - generic [ref=e133]:
        - generic [ref=e134]:
          - generic [ref=e135]: ⌨️
          - generic [ref=e136]:
            - heading "The Linux command line — before a single analysis even begins" [level=4] [ref=e137]
            - paragraph [ref=e138]: Almost every bioinformatics tool runs in a Linux terminal. Most tutorials skip this entirely, assuming you already know it. Most beginners don't — and get stuck immediately.
        - generic [ref=e139]:
          - generic [ref=e140]: 🔧
          - generic [ref=e141]:
            - heading "Tool installation feels like black magic" [level=4] [ref=e142]
            - paragraph [ref=e143]: Setting up STAR, featureCounts, or Salmon from scratch involves dependency management, PATH variables, and environment configuration — all opaque to someone just trying to analyze RNA-seq data.
        - generic [ref=e144]:
          - generic [ref=e145]: 💻
          - generic [ref=e146]:
            - heading "Personal computers simply can't handle the compute" [level=4] [ref=e147]
            - paragraph [ref=e148]: Genome indexing, alignment, and quantification require significant RAM and storage. These jobs need a server or HPC — and most beginners have no path to one.
        - generic [ref=e149]:
          - generic [ref=e150]: 🗂️
          - generic [ref=e151]:
            - heading "A maze of file formats with no map" [level=4] [ref=e152]
            - paragraph [ref=e153]: FASTQ, BAM, SAM, GTF, BED, VCF — knowing which tool requires which format, and how to convert between them, is genuinely confusing when you're starting out.
        - generic [ref=e154]:
          - generic [ref=e155]: 📖
          - generic [ref=e156]:
            - heading "Written tutorials have no \"start here\" arrow" [level=4] [ref=e157]
            - paragraph [ref=e158]: Even comprehensive tutorials can overwhelm a beginner who doesn't know which section to read first, what to skip, or how to connect the pieces into a coherent pipeline.
    - generic [ref=e160]:
