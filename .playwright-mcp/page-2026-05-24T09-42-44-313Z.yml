          - heading "Real data formats, demystified live" [level=4] [ref=e175]
          - paragraph [ref=e176]: We open and explain every file format you'll encounter — FASTQ quality scores, SAM/BAM alignment files, GTF annotations — using real sequencing data, not abstract examples.
        - generic [ref=e177]:
          - generic [ref=e178]: 📊
          - heading "Lean R — only what you need for RNA-seq" [level=4] [ref=e179]
          - paragraph [ref=e180]: Most R courses try to teach the whole language. We cover exactly the R you need for differential expression analysis — nothing more, nothing less. Efficient and immediately applicable.
        - generic [ref=e181]:
