          - heading "Ready-to-use scripts for your own data" [level=4] [ref=e183]
          - paragraph [ref=e184]: You'll leave with annotated, working scripts covering the complete RNA-seq pipeline — code you can apply directly to your own samples, not just classroom examples.
        - generic [ref=e185]:
