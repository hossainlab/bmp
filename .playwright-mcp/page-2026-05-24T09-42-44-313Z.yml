          - heading "Linux from zero — live, guided practice" [level=4] [ref=e171]
          - paragraph [ref=e172]: We start with 'how to open a terminal' and build up. Every command is explained, practiced, and applied in the context of bioinformatics. You'll be fluent in the commands that actually matter.
        - generic [ref=e173]:
