<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1080" height="1080" fill="#FFFFFF"/>
  <rect width="1080" height="340" fill="#F8FAFC"/>
  
  <!-- Decorative Helix Patterns -->
  <path opacity="0.05" d="M0 150C200 150 100 450 300 450C500 450 400 150 600 150C800 150 700 450 900 450C1100 450 1000 150 1200 150" stroke="#2563EB" stroke-width="60" stroke-linecap="round"/>
  <path opacity="0.05" d="M0 450C200 450 100 150 300 150C500 150 400 450 600 450C800 450 700 150 900 150C1100 150 1000 450 1200 450" stroke="#10B981" stroke-width="60" stroke-linecap="round"/>

  <!-- Top Logo & Brand -->
  <g transform="translate(60, 50)">
    <path d="M16 2 L29 9.5 V22.5 L16 30 L3 22.5 V9.5 L16 2Z" transform="scale(2.5)" stroke="#2563EB" stroke-width="2.5" stroke-linejoin="round" />
    <path d="M16 8 L23 12 V20 L16 24 L9 20 V12 L16 8Z" transform="scale(2.5)" stroke="#10B981" stroke-width="2" stroke-linejoin="round" />
    <circle cx="40" cy="40" r="7.5" fill="#2563EB" />
    <circle cx="22.5" cy="30" r="5" fill="#10B981" />
    <circle cx="57.5" cy="50" r="5" fill="#10B981" />
    <text x="90" y="45" font-family="Inter, sans-serif" font-weight="800" font-size="40" fill="#0F172A">BMP</text>
