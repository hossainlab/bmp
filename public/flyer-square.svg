  <!-- Mentor Footer -->
  <rect y="860" width="1080" height="220" fill="#0F172A"/>
  <g transform="translate(60, 905)">
    <text y="20" font-family="sans-serif" font-weight="700" font-size="18" fill="#38BDF8">MENTORED BY</text>
    <text y="65" font-family="sans-serif" font-weight="900" font-size="40" fill="#FFFFFF">Md. Jubayer Hossain</text>
    <text y="100" font-family="sans-serif" font-weight="400" font-size="18" fill="#94A3B8">Founder &amp; CEO, DeepBio Limited</text>
    
    <g transform="translate(560, 5)">
      <rect width="400" height="90" rx="14" fill="#2563EB" />
      <text x="200" y="40" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="30" fill="#FFFFFF">APPLY NOW</text>
      <text x="200" y="72" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="20" fill="#FFFFFF">mdjubayerhossain.com/bmp</text>
    </g>
