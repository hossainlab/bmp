      <rect width="400" height="110" rx="14" fill="#2563EB" />
      <text x="200" y="50" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="32" fill="#FFFFFF">APPLY NOW</text>
      <text x="200" y="85" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="22" fill="#FFFFFF">mdjubayerhossain.com/bmp</text>
