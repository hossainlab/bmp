    <text y="75" font-family="Inter, sans-serif" font-weight="800" font-size="40" fill="#FFFFFF">Md. Jubayer Hossain</text>
    <text y="110" font-family="Inter, sans-serif" font-weight="400" font-size="20" fill="#94A3B8">Founder &amp; CEO, DeepBio Limited</text>
    
