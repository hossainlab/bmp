  <line x1="44" y1="161" x2="296" y2="161" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Significance threshold (horizontal dashed) -->
  <line x1="44" y1="179" x2="296" y2="179" stroke="#cbd5e1" stroke-width="0.8" stroke-dasharray="3,3"/>

