  <!-- Legend box -->
  <rect x="52" y="21" width="128" height="13" rx="3" fill="white" stroke="#e2e8f0" stroke-width="0.6"/>
  <circle cx="61"  cy="27.5" r="2.5" fill="#ef4444" opacity="0.88"/>
  <text    x="66"  y="31"   font-family="Inter,system-ui,sans-serif" font-size="6" fill="#475569">Up-regulated</text>
  <circle cx="108" cy="27.5" r="2.5" fill="#3b82f6" opacity="0.88"/>
  <text    x="113" y="31"   font-family="Inter,system-ui,sans-serif" font-size="6" fill="#475569">Down</text>
  <circle cx="136" cy="27.5" r="2"   fill="#94a3b8" opacity="0.6"/>
  <text    x="141" y="31"   font-family="Inter,system-ui,sans-serif" font-size="6" fill="#475569">NS</text>
