  <line x1="222" y1="33" x2="232" y2="24" stroke="#dc2626" stroke-width="0.7"/>
  <text x="233" y="23" font-family="Inter,system-ui,sans-serif" font-size="6.5" font-weight="700" fill="#dc2626">MYC</text>

