<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0a0e14"/>
  <!-- Left DNA strand -->
  <path d="M 9 4 C 12 8 20 12 23 16 C 20 20 12 24 9 28"
        stroke="#4d9fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Right DNA strand -->
  <path d="M 23 4 C 20 8 12 12 9 16 C 12 20 20 24 23 28"
        stroke="#7eb8ff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Base pair rungs -->
  <line x1="11" y1="8.5"  x2="21" y2="8.5"  stroke="#2a5a8a" stroke-width="1.5"/>
  <line x1="9"  y1="16"   x2="23" y2="16"   stroke="#2a5a8a" stroke-width="1.5"/>
  <line x1="11" y1="23.5" x2="21" y2="23.5" stroke="#2a5a8a" stroke-width="1.5"/>
</svg>
