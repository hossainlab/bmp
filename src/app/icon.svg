<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="32" height="32" rx="7" fill="#0d1219"/>
  <!-- Strand A: blue, S-curve top-left to bottom-right -->
  <path d="M7 5 C24 5 8 27 25 27" stroke="#4d9fff" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Strand B: teal, S-curve top-right to bottom-left -->
  <path d="M25 5 C8 5 24 27 7 27" stroke="#5ee8a0" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Base-pair rung — upper -->
  <line x1="13.5" y1="7.5" x2="18.5" y2="7.5" stroke="rgba(255,255,255,0.28)" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Base-pair rung — lower -->
  <line x1="13.5" y1="24.5" x2="18.5" y2="24.5" stroke="rgba(255,255,255,0.28)" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Endpoint nodes -->
  <circle cx="7"  cy="5"  r="2.2" fill="#4d9fff"/>
  <circle cx="25" cy="5"  r="2.2" fill="#5ee8a0"/>
  <circle cx="25" cy="27" r="2.2" fill="#4d9fff"/>
  <circle cx="7"  cy="27" r="2.2" fill="#5ee8a0"/>
  <!-- Centre crossing node -->
  <circle cx="16" cy="16" r="2.5" fill="white" opacity="0.92"/>
</svg>
